workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive and fix structure
        script: |
          echo "=== Шаг 1: Распаковка архива исходного кода ==="
          if [ -f "amanat_app.tar.gz" ]; then
            echo "Архив amanat_app.tar.gz найден. Распаковка..."
            tar -xzf amanat_app.tar.gz
            echo "Распаковка завершена."
          else
            echo "Критическая ошибка: Файл amanat_app.tar.gz не найден в корне репозитория!"
            ls -la
            exit 1
          fi

          echo "=== Шаг 2: Анализ распакованной структуры ==="
          # Проверяем, куда распаковались файлы.
          # Если они распаковались во вложенную папку (например, {app или amanat_app), приведем к стандарту.
          if [ -d "{app" ]; then
            echo "Обнаружена папка {app, переименовываем в стандартную 'app'..."
            mv "{app" "app"
          elif [ -d "amanat_app" ]; then
            echo "Обнаружена папка amanat_app, переименовываем в 'app'..."
            mv "amanat_app" "app"
          fi

          # Если вдруг проект распаковался так, что 'app' лежит внутри другой подпапки
          if [ ! -d "app" ]; then
            echo "Поиск папки приложения в подкаталогах..."
            DETECTED_APP=$(find . -maxdepth 3 -type d -name "app" | head -n 1)
            if [ -n "$DETECTED_APP" ] && [ "$DETECTED_APP" != "./app" ]; then
              echo "Папка приложения найдена в: $DETECTED_APP. Перемещаем в корень..."
              mv "$DETECTED_APP" ./app
            fi
          fi

          # Финальная проверка наличия папки приложения
          if [ ! -d "app" ]; then
            echo "Папка 'app' не найдена. Создаем базовую структуру, если файлы легли в корень напрямую..."
            mkdir -p app
            # Переносим всё, кроме системных файлов и архива, в папку app
            find . -maxdepth 1 ! -name "." ! -name ".." ! -name "app" ! -name "amanat_app.tar.gz" ! -name "codemagic.yaml" ! -name "*.md" ! -name "*.txt" -exec mv {} app/ \;
          fi

          echo "=== Шаг 3: Генерация XML-ресурсов и иконок ==="
          RES_DIR="app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "=== Шаг 4: Очистка кода от устаревших параметров ==="
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Удаляем параметр tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
          else
            echo "Файл MainScreen.kt не найден в распакованном коде, пропускаем."
          fi

      - name: Recreate Gradle Build Configuration
        script: |
          echo "=== Шаг 5: Конфигурация системных файлов Gradle ==="
          
          cat <<EOF > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PRESERVE_OTHER_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "amanat-app"
          include(":app")
          EOF

          cat <<EOF > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build Android APK
        script: |
          echo "=== Шаг 6: Запуск компиляции приложения ==="
          gradle :app:assembleRelease --no-daemon

    artifacts:
      - "**/build/outputs/apk/release/*.apk"