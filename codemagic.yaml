workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive
        script: |
          echo "Распаковка архива..."
          tar -xzf amanat_app.tar.gz

      - name: Generate missing resources and XML icons
        script: |
          echo "Исправление структуры папок и генерация адаптивных XML-иконок..."
          RES_DIR="amanat_app/app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -rf $RES_DIR/mipmap-*dpi/ic_launcher*.png

      - name: Fix Material Icons Dependencies
        script: |
          echo "Добавление расширенных иконок Material в build.gradle.kts..."
          GRADLE_FILE="amanat_app/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i '' '/dependencies {/a\
                implementation("androidx.compose.material:material-icons-extended")\
            ' "$GRADLE_FILE" 2>/dev/null || sed -i ' /dependencies {/a implementation("androidx.compose.material:material-icons-extended")' "$GRADLE_FILE"
          fi

      - name: Fix Tab Indicator Imports
        script: |
          echo "Исправление импорта tabIndicatorOffset в MainScreen.kt..."
          MAIN_SCREEN="amanat_app/app/src/main/java/com/amanat/ui/screens/MainScreen.kt"
          if [ -f "$MAIN_SCREEN" ]; then
            # Добавляем импорты для обеих версий (Material 2 и Material 3), чтобы одна из них точно подошла
            sed -i '' '/package com.amanat.ui.screens/a\
            import androidx.compose.material.TabRowDefaults.tabIndicatorOffset\
            import androidx.compose.material3.TabRowDefaults.tabIndicatorOffset\
            ' "$MAIN_SCREEN" 2>/dev/null || sed -i ' /package com.amanat.ui.screens/a import androidx.compose.material.TabRowDefaults.tabIndicatorOffset\nimport androidx.compose.material3.TabRowDefaults.tabIndicatorOffset' "$MAIN_SCREEN"
            echo "Импорты успешно добавлены."
          else
            echo "Файл MainScreen.kt не найден!"
          fi

      - name: Build Android APK
        script: |
          echo "Запуск сборки Android приложения через глобальный Gradle..."
          cd amanat_app
          gradle assembleRelease

    artifacts:
      - amanat_app/app/build/outputs/apk/release/*.apk