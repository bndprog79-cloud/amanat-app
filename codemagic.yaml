workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive and fix structure
        script: |
          echo "=== Шаг 1: Распаковка архива исходного кода ==="
          if [ -f "amanat_app.tar.gz" ]; then
            echo "Архив amanat_app.tar.gz найден. Распаковка..."
            tar -xzf amanat_app.tar.gz
            echo "Распаковка завершена."
          else
            echo "Критическая ошибка: Файл amanat_app.tar.gz не найден в корне репозитория!"
            ls -la
            exit 1
          fi

          echo "=== Шаг 2: Анализ и выравнивание структуры папок ==="
          if [ -d "{app" ]; then
            echo "Исправление опечатки папки {app -> app"
            mv "{app" "app"
          elif [ -d "amanat_app" ]; then
            echo "Переименование amanat_app -> app"
            mv "amanat_app" "app"
          fi

          if [ ! -d "app" ]; then
            DETECTED_APP=$(find . -maxdepth 3 -type d -name "app" | head -n 1)
            if [ -n "$DETECTED_APP" ] && [ "$DETECTED_APP" != "./app" ]; then
              mv "$DETECTED_APP" ./app
            fi
          fi

          if [ ! -d "app" ]; then
            mkdir -p app
            find . -maxdepth 1 ! -name "." ! -name ".." ! -name "app" ! -name "amanat_app.tar.gz" ! -name "codemagic.yaml" ! -name "*.md" ! -name "*.txt" -exec mv {} app/ \;
          fi

          echo "=== Шаг 3: Перенос оригинальных файлов настроек Gradle ==="
          ORIG_SETTINGS=$(find ./app -name "settings.gradle*" | head -n 1)
          if [ -n "$ORIG_SETTINGS" ]; then
            echo "Найден оригинальный файл настроек: $ORIG_SETTINGS. Копируем в корень..."
            cp "$ORIG_SETTINGS" .
          fi

          echo "=== Шаг 4: Генерация XML-ресурсов и иконок ==="
          RES_DIR="app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "=== Шаг 5: Очистка кода от устаревших параметров ==="
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Удаляем параметр tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
          fi

      - name: Resolve Gradle Conflicts and Enforce Repositories
        script: |
          echo "=== Шаг 6: Коррекция конфигурации Gradle и очистка плагинов ==="
          
          APP_BUILD="app/build.gradle.kts"
          if [ -f "$APP_BUILD" ]; then
            echo "Глубокая очистка объявлений плагинов во внутреннем файле $APP_BUILD..."
            # Нам нужно удалить из внутреннего файла конструкции версий и флагов apply, 
            # чтобы они не конфликтовали с глобальным buildscript
            sed -i '' 's/version "[^"]*"//g' "$APP_BUILD" 2>/dev/null || sed -i 's/version "[^"]*"//g' "$APP_BUILD"
            sed -i '' 's/, apply false//g' "$APP_BUILD" 2>/dev/null || sed -i 's/, apply false//g' "$APP_BUILD"
          fi

          # Настраиваем чистый, синтаксически верный settings.gradle.kts
          cat <<EOF > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "amanat-app"
          include(":app")
          EOF

          # Настраиваем корневой build.gradle.kts с правильными версиями зависимостей
          cat <<EOF > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.2")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
              }
          }
          EOF

      - name: Build Android APK
        script: |
          echo "=== Шаг 7: Запуск компиляции приложения ==="
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew :app:assembleRelease --no-daemon
          else
            gradle :app:assembleRelease --no-daemon
          fi

    artifacts:
      - "**/build/outputs/apk/release/*.apk"