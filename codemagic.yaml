workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive and fix structure
        script: |
          echo "=== Шаг 1: Распаковка архива исходного кода ==="
          if [ -f "amanat_app.tar.gz" ]; then
            echo "Архив amanat_app.tar.gz найден. Распаковка..."
            tar -xzf amanat_app.tar.gz
            echo "Распаковка завершена."
          else
            echo "Критическая ошибка: Файл amanat_app.tar.gz не найден в корне репозитория!"
            ls -la
            exit 1
          fi

          echo "=== Шаг 2: Анализ и выравнивание структуры папок ==="
          if [ -d "{app" ]; then
            echo "Исправление опечатки папки {app -> app"
            mv "{app" "app"
          elif [ -d "amanat_app" ]; then
            echo "Переименование amanat_app -> app"
            mv "amanat_app" "app"
          fi

          echo "Поиск главного файла AndroidManifest.xml..."
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -not -path "*/build/*" -not -path "./app/src/main/AndroidManifest.xml" | head -n 1)

          if [ -n "$MANIFEST_PATH" ]; then
            echo "Манифест найден по пути: $MANIFEST_PATH"
            SRC_PARENT_DIR=$(echo "$MANIFEST_PATH" | sed 's/\/src\/main\/AndroidManifest.xml//' | sed 's/\/AndroidManifest.xml//')
            
            if [ -d "$SRC_PARENT_DIR/src" ] && [ "$SRC_PARENT_DIR" != "./app" ]; then
              echo "Переносим найденную структуру src из $SRC_PARENT_DIR в ./app/"
              mkdir -p app
              cp -R "$SRC_PARENT_DIR/src" app/
            elif [ -f "$MANIFEST_PATH" ] && [ "$SRC_PARENT_DIR" != "./app/src/main" ]; then
              echo "Манифест лежал изолированно. Создаем структуру вручную..."
              mkdir -p app/src/main
              cp "$MANIFEST_PATH" app/src/main/
              if [ -d "$SRC_PARENT_DIR/java" ]; then cp -R "$SRC_PARENT_DIR/java" app/src/main/; fi
              if [ -d "$SRC_PARENT_DIR/kotlin" ]; then cp -R "$SRC_PARENT_DIR/kotlin" app/src/main/; fi
              if [ -d "$SRC_PARENT_DIR/res" ]; then cp -R "$SRC_PARENT_DIR/res" app/src/main/; fi
            fi
          fi

          if [ ! -d "app/src/main" ]; then
            mkdir -p app/src/main
          fi

          echo "=== Шаг 3: Перенос оригинальных файлов настроек Gradle ==="
          ORIG_SETTINGS=$(find ./app -name "settings.gradle*" | head -n 1)
          if [ -n "$ORIG_SETTINGS" ]; then
            echo "Найден оригинальный файл настроек: $ORIG_SETTINGS. Копируем в корень..."
            cp "$ORIG_SETTINGS" .
          fi

          echo "=== Шаг 4: Генерация XML-ресурсов и иконок ==="
          RES_DIR="app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter and Clear Hardcoded Versions
        script: |
          echo "=== Шаг 5: Глубокая очистка несовместимого кода ==="
          find . -name "MainScreen.kt" | while read -r file; do
            echo "Обработка файла: $file"
            sed -i '' '/tabIndicatorOffset/d' "$file" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$file"
            sed -i '' 's/\.tabIndicatorOffset[^)]*)//g' "$file" 2>/dev/null || sed -i 's/\.tabIndicatorOffset[^)]*)//g' "$file"
          done

          find . -name "build.gradle.kts" -not -path "./build.gradle.kts" | while read -r gradle_file; do
            sed -i '' 's/id(\"com.android.application\").*version.*/id(\"com.android.application\")/g' "$gradle_file" 2>/dev/null || sed -i 's/id(\"com.android.application\").*version.*/id(\"com.android.application\")/g' "$gradle_file"
            sed -i '' 's/id(\"com.android.library\").*version.*/id(\"com.android.library\")/g' "$gradle_file" 2>/dev/null || sed -i 's/id(\"com.android.library\").*version.*/id(\"com.android.library\")/g' "$gradle_file"
            sed -i '' 's/id(\"org.jetbrains.kotlin.android\").*version.*/id(\"org.jetbrains.kotlin.android\")/g' "$gradle_file" 2>/dev/null || sed -i 's/id(\"org.jetbrains.kotlin.android\").*version.*/id(\"org.jetbrains.kotlin.android\")/g' "$gradle_file"
          done

          if [ -f "app/build.gradle.kts" ]; then
            mv app/build.gradle.kts app/build.gradle.kts.old
          fi

      - name: Recreate Safe Gradle Architecture
        script: |
          echo "=== Шаг 6: Развертывание гибкой архитектуры Gradle ==="
          rm -f build.gradle build.gradle.kts settings.gradle settings.gradle.kts gradle.properties

          cat <<EOF > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "amanat-app"
          include(":app")
          EOF

          cat <<EOF > build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("com.android.library") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.8.10" apply false
          }

          tasks.register<Delete>("clean") {
              delete(rootProject.layout.buildDirectory)
          }
          EOF

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          cat <<EOF > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.example.amanat"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.example.amanat"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"

                  testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                  vectorDrawables {
                      useSupportLibrary = true
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
                  // Добавляем автоматическое подавление предупреждений экспериментального API
                  freeCompilerArgs += listOf("-opt-in=androidx.compose.material3.ExperimentalMaterial3Api", "-opt-in=androidx.compose.material.ExperimentalMaterialApi")
              }
              buildFeatures {
                  compose = true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion = "1.4.3"
              }
              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.10.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.1")
              implementation("androidx.activity:activity-compose:1.7.2")
              
              val composeBom = platform("androidx.compose:compose-bom:2023.06.01")
              implementation(composeBom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.ui:ui-tooling-preview")
              
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material")
              implementation("androidx.compose.material:material-icons-extended")
              
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.6.1")
              implementation("androidx.navigation:navigation-compose:2.6.0")
              
              testImplementation("junit:junit:4.13.2")
              androidTestImplementation("androidx.test.ext:junit:1.1.5")
              androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
              androidTestImplementation(platform("androidx.compose:compose-bom:2023.06.01"))
              androidTestImplementation("androidx.compose.ui:ui-test-junit4")
              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF

      - name: Build Android APK
        script: |
          echo "=== Шаг 7: Запуск компиляции приложения ==="
          # Добавляем детальный вывод ошибок компилятора в консоль на случай падения
          gradle :app:assembleDebug --no-daemon --stacktrace || { echo "=== КРИТИЧЕСКАЯ ОШИБКА: Выводим лог компиляции ==="; find app/build/reports -type f -name "*.html" -exec cat {} \; 2>/dev/null; exit 1; }

    artifacts:
      - "**/build/outputs/apk/debug/*.apk"