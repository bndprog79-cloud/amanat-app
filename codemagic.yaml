workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive
        script: |
          echo "Распаковка архива..."
          tar -xzf amanat_app.tar.gz

      - name: Build Android APK
        script: |
          echo "Запуск сборки Android приложения через глобальный Gradle..."
          cd amanat_app
          # Используем глобальный установленный gradle вместо отсутствующего gradlew
          gradle assembleRelease

    artifacts:
      - amanat_app/app/build/outputs/apk/release/*.apk