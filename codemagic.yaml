workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive
        script: |
          echo "Распаковка архива..."
          tar -xzf amanat_app.tar.gz

      - name: Merge resources and fix folder typo
        script: |
          echo "Проверка и исправление структуры ресурсов..."
          # Если папка с опечаткой {app существует, копируем её содержимое в основную папку app
          if [ -d "amanat_app/{app" ]; then
            echo "Обнаружена папка с опечаткой {app. Объединяем ресурсы..."
            cp -R amanat_app/\{app/* amanat_app/app/ 2>/dev/null || true
          fi

      - name: Build Android APK
        script: |
          echo "Запуск сборки Android приложения через глобальный Gradle..."
          cd amanat_app
          gradle assembleRelease

    artifacts:
      - amanat_app/app/build/outputs/apk/release/*.apk