workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17
      flutter: stable

    triggering:
      events:
        - push

    scripts:
      - name: Diagnostic - Check folder structure
        script: |
          echo "==== РАСПАКОВКА АРХИВА ===="
          tar -xzf amanat_app.tar.gz
          
          echo "==== ЧТО НАХОДИТСЯ В КОРНЕ КЛОНА ===="
          ls -la
          
          echo "==== ПРОВЕРКА СОДЕРЖИМОГО ПАПКИ amanat_app (если она есть) ===="
          if [ -d "amanat_app" ]; then ls -la amanat_app; else echo "Папки amanat_app не существует"; fi
          
          echo "==== КОНЕЦ ДИАГНОСТИКИ ===="
          exit 1