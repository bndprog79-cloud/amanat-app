workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Auto-detect and fix directory structure
        script: |
          echo "=== Автоматический поиск исходного кода приложения ==="
          
          # 1. Проверяем стандартный вариант
          if [ -d "app" ]; then
            echo "Стандартная папка 'app' на месте."
          # 2. Проверяем вариант с опечаткой {, который был ранее
          elif [ -d "{app" ]; then
            echo "Найдена папка {app, исправляем имя на 'app'..."
            mv "{app" "app"
          else
            echo "Папка 'app' не найдена в корне. Ищем внутренний модуль Android..."
            # Ищем, где лежит файл build.gradle или build.gradle.kts, исключая корень
            FOUND_DIR=$(find . -maxdepth 3 -name "build.gradle*" ! -path "./build.gradle*" | head -n 1)
            
            if [ -n "$FOUND_DIR" ]; then
              # Получаем имя папки, содержащей этот файл
              ACTUAL_DIR=$(basename $(dirname "$FOUND_DIR"))
              echo "Исходный код обнаружен в папке: $ACTUAL_DIR"
              
              if [ "$ACTUAL_DIR" != "." ] && [ "$ACTUAL_DIR" != "app" ]; then
                echo "Переименовываем '$ACTUAL_DIR' в стандартную 'app'..."
                mv "$ACTUAL_DIR" "app"
              fi
            else
              echo "=== СТРУКТУРА РЕПОЗИТОРИЯ ДЛЯ ОТЛАДКИ ==="
              ls -R
              echo "Критическая ошибка: Не удалось локализовать файлы Android-проекта."
              exit 1
            fi
          fi

          echo "Генерация системных XML-файлов и адаптивных иконок..."
          RES_DIR="app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "Очистка MainScreen.kt от проблемного параметра..."
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
            echo "Файл MainScreen.kt успешно очищен."
          fi

      - name: Recreate Gradle Build Configuration
        script: |
          echo "Принудительное пересоздание корневой конфигурации Gradle..."
          
          cat <<EOF > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PRESERVE_OTHER_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "amanat-app"
          include(":app")
          EOF

          cat <<EOF > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build APK
        script: |
          echo "Запуск компиляции приложения..."
          gradle :app:assembleRelease --no-daemon

    artifacts:
      - "**/build/outputs/apk/release/*.apk"