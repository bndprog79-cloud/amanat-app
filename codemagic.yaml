workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17
      flutter: stable

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive
        script: |
          echo "Распаковка архива..."
          tar -xzf amanat_app.tar.gz

      - name: Get Flutter packages
        script: |
          echo "Поиск файла pubspec.yaml..."
          # Автоматически находим папку, в которой лежит pubspec.yaml
          FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          
          if [ -z "$FLUTTER_DIR" ]; then
            echo "Ошибка: Файл pubspec.yaml не найден в архиве!"
            exit 1
          fi
          
          echo "Проект Flutter найден в папке: $FLUTTER_DIR"
          cd "$FLUTTER_DIR"
          flutter packages pub get
          
          # Сохраняем путь для следующего шага сборки
          echo "$FLUTTER_DIR" > "$BASEDIR/flutter_path.txt"
      
      - name: Build Android APK
        script: |
          # Считываем сохраненный путь к проекту
          FLUTTER_DIR=$(cat "$BASEDIR/flutter_path.txt")
          cd "$FLUTTER_DIR"
          flutter build apk --release