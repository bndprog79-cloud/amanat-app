workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Generate missing resources and XML icons
        script: |
          echo "Проверка целевой папки приложения..."
          # Определяем, как называется папка: {app или app
          if [ -d "{app" ]; then
            APP_DIR="{app"
          else
            APP_DIR="app"
          fi
          echo "Используем директорию приложения: $APP_DIR"
          
          RES_DIR="$APP_DIR/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "Поиск и очистка MainScreen.kt..."
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          
          if [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Очищаем от tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
            echo "Очистка успешно завершена."
          else
            echo "Предупреждение: Файл MainScreen.kt не найден."
          fi

      - name: Build APK
        script: |
          echo "Работаем в корневом каталоге сборки..."
          
          # Если на верхнем уровне нет файлов Gradle, попробуем исправить это динамически
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
             echo "Ищем вложенную папку с конфигурацией Gradle..."
             NESTED_DIR=$(dirname $(find . -name "settings.gradle*" | head -n 1) 2>/dev/null)
             if [ -n "$NESTED_DIR" ] && [ "$NESTED_DIR" != "." ]; then
                 cd "$NESTED_DIR"
                 echo "Перешли в папку: $NESTED_DIR"
             fi
          fi

          echo "Настройка прав доступа для локального сборщика..."
          chmod +x gradlew 2>/dev/null || true
          
          echo "Запуск компиляции приложения через assembleRelease..."
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease
          else
            echo "Локальный gradlew не найден, запускаем сборку глобально..."
            gradle assembleRelease
          fi

    artifacts:
      - "**/build/outputs/apk/release/*.apk"