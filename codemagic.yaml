workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Generate missing resources and XML icons
        script: |
          echo "Поиск папки с Android-проектом..."
          # Ищем, где лежит папка app, и заходим на один уровень выше
          PROJECT_ROOT=$(dirname $(find . -name "build.gradle.kts" -o -name "build.gradle" | head -n 1) 2>/dev/null)
          
          # Если папка app вложена глубже (например, в amanat_app/app), то корень проекта — amanat_app
          if [[ "$PROJECT_ROOT" == *"/"* ]]; then
            PROJECT_ROOT=$(dirname "$PROJECT_ROOT")
          else
            PROJECT_ROOT="."
          fi
          
          echo "Проект найден в директории: $PROJECT_ROOT"
          RES_DIR="$PROJECT_ROOT/app/src/main/res"
          
          echo "Генерация системных XML-файлов и адаптивных иконок..."
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "Автоматический поиск и очистка MainScreen.kt..."
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          
          if [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден по пути: $MAIN_SCREEN. Удаляем tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
            echo "Файл успешно скорректирован."
          else
            echo "Предупреждение: Файл MainScreen.kt не найден в репозитории!"
          fi

      - name: Build APK
        script: |
          echo "Поиск корня сборки Gradle..."
          # Находим папку, где лежит settings.gradle или settings.gradle.kts
          BUILD_DIR=$(dirname $(find . -name "settings.gradle*" | head -n 1) 2>/dev/null)
          
          if [ -z "$BUILD_DIR" ] || [ "$BUILD_DIR" = "." ]; then
            echo "Сборка в корневом каталоге."
          else
            echo "Переходим в папку проекта: $BUILD_DIR"
            cd "$BUILD_DIR"
          fi

          echo "Настройка прав доступа для локального сборщика..."
          chmod +x gradlew 2>/dev/null || true
          
          echo "Запуск компиляции приложения..."
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease
          else
            echo "Локальный файл gradlew не обнаружен, используем глобальную систему сборки..."
            gradle assembleRelease
          fi

    artifacts:
      - "**/build/outputs/apk/release/*.apk"