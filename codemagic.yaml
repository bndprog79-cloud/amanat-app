workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17
      flutter: stable

    triggering:
      events:
        - push

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build Android APK
        script: |
          flutter build apk --release