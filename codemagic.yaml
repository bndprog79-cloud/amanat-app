workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive and fix structure
        script: |
          echo "=== Шаг 1: Распаковка архива исходного кода ==="
          if [ -f "amanat_app.tar.gz" ]; then
            echo "Архив amanat_app.tar.gz найден. Распаковка..."
            tar -xzf amanat_app.tar.gz
            echo "Распаковка завершена."
          else
            echo "Критическая ошибка: Файл amanat_app.tar.gz не найден в корне репозитория!"
            ls -la
            exit 1
          fi

          echo "=== Шаг 2: Анализ и выравнивание структуры папок ==="
          # Нам нужно, чтобы папка с исходниками (где лежит src и build.gradle.kts) называлась строго 'app'
          if [ -d "{app" ]; then
            echo "Исправление опечатки папки {app -> app"
            mv "{app" "app"
          elif [ -d "amanat_app" ]; then
            echo "Переименование amanat_app -> app"
            mv "amanat_app" "app"
          fi

          # Если проект распаковался глубже, вытаскиваем папку app на поверхность
          if [ ! -d "app" ]; then
            DETECTED_APP=$(find . -maxdepth 3 -type d -name "app" | head -n 1)
            if [ -n "$DETECTED_APP" ] && [ "$DETECTED_APP" != "./app" ]; then
              mv "$DETECTED_APP" ./app
            fi
          fi

          # Если файлы легли прямо в корень, собираем их в папку app
          if [ ! -d "app" ]; then
            mkdir -p app
            find . -maxdepth 1 ! -name "." ! -name ".." ! -name "app" ! -name "amanat_app.tar.gz" ! -name "codemagic.yaml" ! -name "*.md" ! -name "*.txt" -exec mv {} app/ \;
          fi

          echo "=== Шаг 3: Перенос оригинальных файлов настроек Gradle в корень ==="
          # Ищем оригинальный settings.gradle или settings.gradle.kts внутри распакованного кода
          ORIG_SETTINGS=$(find ./app -name "settings.gradle*" | head -n 1)
          if [ -n "$ORIG_SETTINGS" ]; then
            echo "Найден оригинальный файл настроек: $ORIG_SETTINGS. Копируем в корень репозитория..."
            cp "$ORIG_SETTINGS" .
          fi

          # Ищем оригинальный корневой build.gradle или build.gradle.kts, если он был в архиве
          ORIG_ROOT_BUILD=$(find ./app -maxdepth 1 -name "build.gradle*" | head -n 1)
          if [ -n "$ORIG_ROOT_BUILD" ] && [ "$ORIG_ROOT_BUILD" != "./app/build.gradle.kts" ] && [ "$ORIG_ROOT_BUILD" != "./app/build.gradle" ]; then
            echo "Найден оригинальный корневой build.gradle: $ORIG_ROOT_BUILD. Копируем в корень..."
            cp "$ORIG_ROOT_BUILD" .
          fi

          echo "=== Шаг 4: Генерация XML-ресурсов и иконок ==="
          RES_DIR="app/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "=== Шаг 5: Очистка кода от устаревших параметров ==="
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Удаляем параметр tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
          fi

      - name: Resolve Gradle Conflicts and Enforce Repositories
        script: |
          echo "=== Шаг 6: Коррекция конфигурации Gradle под версию 8.x ==="
          
          # Если файла settings.gradle.kts в корне всё ещё нет, создаем его с правильным импортом модуля
          if [ ! -f "settings.gradle.kts" ] && [ ! -f "settings.gradle" ]; then
            echo "Создание чистого файла конфигурации репозиториев..."
            cat <<EOF > settings.gradle.kts
            pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            dependencyResolutionManagement {
                repositoriesMode.set(RepositoriesMode.PRESERVE_OTHER_REPOS)
                repositories {
                    google()
                    mavenCentral()
                }
            }
            rootProject.name = "amanat-app"
            include(":app")
          EOF
          fi

          # Очищаем корневой build.gradle.kts, чтобы плагины не объявлялись дважды и не конфликтовали
          cat <<EOF > build.gradle.kts
          // Корневой файл очищен скриптом автоматизации для предотвращения конфликтов плагинов дублирования.
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.2")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
              }
          }
          EOF

      - name: Build Android APK
        script: |
          echo "=== Шаг 7: Запуск компиляции приложения ==="
          # Запускаем сборку через встроенный скрипт gradlew из вашего архива, если он есть, иначе глобально
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew :app:assembleRelease --no-daemon
          else
            gradle :app:assembleRelease --no-daemon
          fi

    artifacts:
      - "**/build/outputs/apk/release/*.apk"