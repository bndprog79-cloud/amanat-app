workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Generate missing resources and XML icons
        script: |
          echo "Определяем рабочую папку приложения..."
          if [ -d "{app" ]; then
            APP_DIR="{app"
          elif [ -d "app" ]; then
            APP_DIR="app"
          else
            APP_DIR="app"
            mkdir -p app/src/main/res
          fi
          echo "Выбрана папка: $APP_DIR"
          
          RES_DIR="$APP_DIR/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "Поиск и исправление MainScreen.kt..."
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Очищаем tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
          fi

      - name: Build APK
        script: |
          echo "Корректировка конфигурации и сборка..."
          
          # 1. Если папка называется {app, переименуем её в нормальную 'app' для Gradle
          if [ -d "{app" ]; then
            echo "Исправление опечатки: переименование папки {app в app..."
            mv "{app" "app_temp"
            rm -rf "{app"
            mv "app_temp" "app"
          fi

          # 2. Попробуем найти оригинальные gradle-файлы, которые могли затеряться в подпапках
          echo "Поиск оригинальных конфигураций Gradle..."
          ORIG_SETTINGS=$(find . -name "settings.gradle*" ! -path "./settings.gradle*" | head -n 1)
          if [ -n "$ORIG_SETTINGS" ]; then
            echo "Найден оригинальный файл настроек: $ORIG_SETTINGS. Копируем в корень..."
            cp "$ORIG_SETTINGS" ./settings.gradle.kts 2>/dev/null || cp "$ORIG_SETTINGS" ./settings.gradle
          fi

          # 3. На всякий случай проверяем и гарантируем связь с модулем :app
          if [ ! -f "settings.gradle.kts" ] && [ ! -f "settings.gradle" ]; then
            echo "Создание резервного settings.gradle.kts..."
            echo 'rootProject.name = "amanat-app"' > settings.gradle.kts
            echo 'include(":app")' >> settings.gradle.kts
          fi

          # 4. Если в корне всё ещё нет build.gradle, создаем базовый импорт
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            cat <<EOF > build.gradle.kts
            plugins {
                id("com.android.application") version "8.2.2" apply false
                id("org.jetbrains.kotlin.android") version "1.9.22" apply false
            }
          EOF
          fi

          echo "Проверка доступных задач в проекте:"
          gradle tasks --no-daemon || true

          echo "Запуск компиляции..."
          gradle :app:assembleRelease --no-daemon || gradle assembleRelease --no-daemon

    artifacts:
      - "**/build/outputs/apk/release/*.apk"