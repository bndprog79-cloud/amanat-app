workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Generate missing resources and XML icons
        script: |
          echo "Определяем правильное имя папки приложения..."
          if [ -d "{app" ]; then
            APP_DIR="{app"
          elif [ -d "app" ]; then
            APP_DIR="app"
          else
            echo "Папка приложения не найдена, создаем стандартную 'app'..."
            APP_DIR="app"
            mkdir -p app/src/main/res
          fi
          echo "Выбрана папка: $APP_DIR"
          
          RES_DIR="$APP_DIR/src/main/res"
          mkdir -p "$RES_DIR/xml"
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"

          cat <<EOF > "$RES_DIR/xml/backup_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content />
          EOF

          cat <<EOF > "$RES_DIR/xml/data_extraction_rules.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup />
              <device-transfer />
          </data-extraction-rules>
          EOF

          cat <<EOF > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <color android:color="#FFFFFF"/>
              </background>
              <foreground>
                  <vector android:height="108dp" android:width="108dp" android:viewportHeight="108" android:viewportWidth="108">
                      <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
                  </vector>
              </foreground>
          </adaptive-icon>
          EOF

          cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          rm -f $RES_DIR/mipmap-*dpi/ic_launcher*.png 2>/dev/null || true

      - name: Safe Remove Tab Indicator Parameter
        script: |
          echo "Поиск и исправление MainScreen.kt..."
          MAIN_SCREEN=$(find . -name "MainScreen.kt" | head -n 1)
          if [ -n "$MAIN_SCREEN" ] && [ -f "$MAIN_SCREEN" ]; then
            echo "Файл найден: $MAIN_SCREEN. Очищаем tabIndicatorOffset..."
            sed -i '' '/tabIndicatorOffset/d' "$MAIN_SCREEN" 2>/dev/null || sed -i '/tabIndicatorOffset/d' "$MAIN_SCREEN"
          else
            echo "Файл MainScreen.kt не найден, пропускаем этот шаг."
          fi

      - name: Build APK
        script: |
          echo "Проверка конфигурации Gradle в корне репозитория..."
          
          # Определяем папку приложения для конфигурации
          if [ -d "{app" ]; then
            MODULE_NAME="{app"
          else
            MODULE_NAME="app"
          fi

          # Если файлов Gradle нет на месте, принудительно создаем их!
          if [ ! -f "settings.gradle.kts" ] && [ ! -f "settings.gradle" ]; then
            echo "Файлы Gradle не найдены. Генерируем базовый settings.gradle.kts..."
            cat <<EOF > settings.gradle.kts
            pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            dependencyResolutionManagement {
                repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
                repositories {
                    google()
                    mavenCentral()
                }
            }
            rootProject.name = "amanat-app"
            include(":$MODULE_NAME")
          EOF
          fi

          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            echo "Генерируем базовый корневой build.gradle.kts..."
            cat <<EOF > build.gradle.kts
            plugins {
                id("com.android.application") version "8.2.2" apply false
                id("org.jetbrains.kotlin.android") version "1.9.22" apply false
            }
          EOF
          fi

          echo "Запуск компиляции проекта..."
          gradle assembleRelease
          
    artifacts:
      - "**/build/outputs/apk/release/*.apk"