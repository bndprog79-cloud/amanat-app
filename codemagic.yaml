workflows:
  android-workflow:
    name: Android Build AMANAT
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Extract project archive
        script: |
          echo "Распаковка архива..."
          tar -xzf amanat_app.tar.gz

      - name: Set up Gradle permissions
        script: |
          echo "Настройка прав доступа для Gradle..."
          # Переходим в папку с проектом, где лежат настройки Gradle
          cd amanat_app
          # Даем системе права на выполнение утилиты сборки gradlew
          chmod +x gradlew

      - name: Build Android APK
        script: |
          echo "Запуск сборки Android приложения через Gradle..."
          cd amanat_app
          # Запускаем сборку релизного APK (assembleRelease)
          ./gradlew assembleRelease

    artifacts:
      - amanat_app/app/build/outputs/apk/release/*.apk